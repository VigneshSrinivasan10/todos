<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0e0c" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      window.global = window;
      window.process = window.process || { browser: true, env: {}, nextTick: function (f) { setTimeout(f, 0); } };

      // Diagnostic: paint any error/unhandled-rejection directly into #root.
      (function () {
        function paint(label, detail) {
          var el = document.getElementById('root');
          if (!el) return;
          var pre = document.createElement('pre');
          pre.style.cssText = 'color:#ff6b6b;background:#1a1a1a;padding:16px;margin:16px;white-space:pre-wrap;font:12px ui-monospace,monospace;border:1px solid #ff6b6b;border-radius:6px';
          pre.textContent = '[' + label + '] ' + detail;
          el.appendChild(pre);
        }
        window.addEventListener('error', function (e) {
          paint('error', (e.message || e.error || 'unknown') + '\nat ' + (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?') + (e.error && e.error.stack ? '\n' + e.error.stack : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason || {};
          paint('promise', (r.message || String(r)) + (r.stack ? '\n' + r.stack : ''));
        });
        // If React hasn't painted anything within 4s, say so.
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childNodes.length === 0) {
            paint('idle', 'No JS error reported, but React never mounted within 4s. UA: ' + navigator.userAgent);
          }
        }, 4000);
      })();
    </script>
    <title>todos</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
